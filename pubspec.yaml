name: nutrition_offline_app
description: App móvil de nutrición y seguimiento físico offline-first.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^3.3.1
  go_router: ^14.8.1
  flutter_animate: ^4.5.0
  lottie: ^3.1.0
  riverpod_annotation: ^4.0.2
  isar_community: ^3.3.2
  isar_community_flutter_libs: ^3.3.2
  path_provider: ^2.1.5
  google_fonts: ^6.2.1
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0
  fl_chart: ^0.68.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^4.0.3
  isar_community_generator: ^3.3.2
  freezed: ^3.2.5
  json_serializable: ^6.9.0

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
